version: '3.8'

services:
  postgres:
    restart: unless-stopped
    environment:
      - POSTGRES_DB=figure_mcp_prod
      - POSTGRES_USER=figure_mcp_prod
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

  redis:
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_prod_data:/data

  chromadb:
    restart: unless-stopped
    volumes:
      - chroma_prod_data:/chroma/chroma

  document-processor:
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - POSTGRES_URL=postgresql://figure_mcp_prod:${POSTGRES_PASSWORD}@postgres:5432/figure_mcp_prod
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  mcp-server:
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - POSTGRES_URL=postgresql://figure_mcp_prod:${POSTGRES_PASSWORD}@postgres:5432/figure_mcp_prod
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - JIRA_BASE_URL=${JIRA_BASE_URL}
      - JIRA_USERNAME=${JIRA_USERNAME}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  web-ui:
    restart: unless-stopped
    environment:
      - VITE_MCP_SERVER_URL=${MCP_SERVER_URL}
      - VITE_API_BASE_URL=${API_BASE_URL}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  nginx:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

volumes:
  postgres_prod_data:
  redis_prod_data:
  chroma_prod_data: 